name: Tests & Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cash_test
          POSTGRES_USER: cash_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r analytics/requirements.txt

    - name: Create .env file for testing
      run: |
        cat > .env << EOF
        SECRET_KEY=test-secret-key-for-ci-cd-only
        DEBUG=False
        ALLOWED_HOSTS=localhost,127.0.0.1,testserver
        DB_ENGINE=sqlite3
        DB_NAME=test_db.sqlite3
        ENVIRONMENT=testing
        EOF

    - name: Django System Check
      run: python manage.py check

    - name: Run migrations
      run: python manage.py migrate

    - name: Run Django tests
      run: python manage.py test --verbosity=2

    - name: Run API tests
      run: |
        python test_api.py 2>/dev/null || echo "⚠️  Some API tests may require data setup"

    - name: Lint with flake8
      run: |
        pip install flake8
        # Ignorer les migrations et les fichiers de test non critiques
        flake8 analytics cash_project --count --select=E9,F63,F7,F82 --show-source --statistics || true
        flake8 analytics cash_project --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code style with black
      run: |
        pip install black
        black --check analytics cash_project --diff || true

    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r analytics cash_project --skip B101,B601 -f json -o bandit-report.json || true

    - name: Upload coverage reports
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        pip install flake8 black pylint bandit

    - name: Run flake8
      run: |
        flake8 analytics cash_project --count --exit-zero --max-line-length=127 --statistics

    - name: Run black formatter check
      run: |
        black --check analytics cash_project || true

    - name: Run pylint on critical files
      run: |
        pylint analytics/models.py analytics/views.py --exit-zero || true
