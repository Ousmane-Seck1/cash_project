name: Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r analytics/requirements.txt
        pip install pylint black flake8 bandit safety

    - name: Create minimal .env for checks
      run: |
        echo "SECRET_KEY=test-key-for-ci" > .env
        echo "DEBUG=False" >> .env
        echo "ALLOWED_HOSTS=localhost" >> .env

    - name: Django Check
      run: python manage.py check

    - name: Safety check for vulnerabilities
      run: |
        safety check --json || echo "⚠️  Some dependencies may have known vulnerabilities"

    - name: Code format check with Black
      run: |
        black --check analytics/ cash_project/ --line-length=100 || echo "Run: black analytics/ cash_project/ --line-length=100"

    - name: Pylint analysis
      run: |
        pylint analytics/models.py analytics/views.py analytics/serializers.py \
          --rcfile=.pylintrc --exit-zero -f colorized || true

    - name: Flake8 linting
      run: |
        flake8 analytics/ cash_project/ \
          --max-line-length=100 \
          --exclude=migrations,__pycache__ \
          --count --statistics

    - name: Bandit security scan
      run: |
        bandit -r analytics/ cash_project/ \
          -ll \
          -f json -o bandit-report.json || true
        echo "✓ Bandit scan complete. Review bandit-report.json for findings."
